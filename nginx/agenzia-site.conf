# ═══════════════════════════════════════════════════════════════════════════════
#  Nginx config — Agenzia site  +  AGENZIA v4+ trading dashboard
#  Server: 204.168.190.123 (Hetzner)
#
#  Architecture:
#    :80  / :443  → React/Vite static site  (agenzia.uk)
#    :8080         → AGENZIA v4+ trading dashboard  (already running, untouched)
#    /dashboard    → Proxied to trading dashboard (optional, behind auth)
# ═══════════════════════════════════════════════════════════════════════════════

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name agenzia.uk www.agenzia.uk 204.168.190.123;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — Main site ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name agenzia.uk www.agenzia.uk;

    # SSL — managed by Certbot / Let's Encrypt
    # Run once to generate: certbot --nginx -d agenzia.uk -d www.agenzia.uk
    ssl_certificate     /etc/letsencrypt/live/agenzia.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agenzia.uk/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Static site ──────────────────────────────────────────────────────────
    root  /var/www/agenzia-site;
    index index.html;

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/x-javascript text/xml application/xml
               application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — all routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Trading dashboard proxy (optional — protect with basic auth) ─────────
    location /dashboard/ {
        # Uncomment to enable basic auth:
        # auth_basic           "AGENZIA v4+ Dashboard";
        # auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass         http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400;
    }
}

# ── HTTP fallback — direct IP access (no SSL cert yet) ───────────────────────
server {
    listen 80 default_server;
    server_name _;

    root  /var/www/agenzia-site;
    index index.html;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
